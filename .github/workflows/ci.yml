name: Flight Tracker CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - '/backend/**'
      - '/frontend/**'

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run against"
        required: true
        type: choice
        default: 'staging'
        options:
          - 'staging'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Enable Corepack
      run: |
        corepack enable
        corepack prepare yarn@stable --activate
    
    - name: Get yarn cache directory path
      id: yarn-cache-dir-path
      run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
    
    - uses: actions/cache@v4
      id: yarn-cache
      with:
        path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
        key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-

    - name: Install Dependencies in Backend
      run: yarn install --immutable
      working-directory: ./backend
    
    - name: Install Dependencies in Frontend
      run: yarn install --immutable
      working-directory: ./frontend

    - name: Lint and Security Scan in Frontend
      run: yarn lint
      working-directory: ./frontend

    - name: Running Test in Backend
      run: yarn test
      working-directory: .backend
    
    - name: Running Test in Frontend
      run: yarn test
      working-directory: ./frontend

    - name: Building Project in Backend
      run: yarn build
      working-directory: ./backend

    - name: Building Project in Frontend
      run: yarn build
      working-directory: ./frontend

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Log in to Github Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ghcr.io/ammanrizwan/flight-tracker/backend:latest
    - name: Build and push frontend
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ghcr.io/ammanrizwan/flight-tracker/frontend:latest
